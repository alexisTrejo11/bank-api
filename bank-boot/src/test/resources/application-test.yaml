spring:
  datasource:
    url: jdbc:h2:mem:banktest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  health:
    redis:
      enabled: false

bank:
  rate-limiting:
    enabled: false
  http:
    cors:
      allowed-origins: []
  iam:
    redis:
      enabled: false
  payments:
    redis-idempotency: false
  loans:
    internal-funding-account-id: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
  notifications:
    dev-redirect-email: ""
    stub-sms-e164: "+15555550100"
    dispatch-mode: direct
    kafka:
      enabled: false
