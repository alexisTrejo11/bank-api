spring:
  application:
    name: bank
  datasource:
    url: jdbc:h2:mem:bank;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true

# In-memory refresh + JWT blocklist until Redis is wired (Phase 0 / local dev)
bank:
  iam:
    redis:
      enabled: false
  payments:
    redis-idempotency: false
