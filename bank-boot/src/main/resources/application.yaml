spring:
  application:
    name: bank
  datasource:
    url: jdbc:h2:mem:bank;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: false

# In-memory refresh + JWT blocklist until Redis is wired (default / tests).
bank:
  http:
    cors:
      allowed-origins: []
  iam:
    redis:
      enabled: false
  payments:
    redis-idempotency: false
  loans:
    internal-funding-account-id: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
  notifications:
    dev-redirect-email: ""
    stub-sms-e164: "+15555550100"
    dispatch-mode: direct
    kafka:
      enabled: false
      dispatch-topic: bank.notifications.dispatch
      pipeline-topic: bank.notifications.pipeline
