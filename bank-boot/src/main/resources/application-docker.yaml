# Docker Compose stack — provide all values via environment / .env (see .env.example).
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:bank-notifications}
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  health:
    redis:
      enabled: true

bank:
  # Phase 8 domain-event pipeline: set BANK_KAFKA_ENABLED=true when handlers publish via Kafka.
  kafka:
    enabled: ${BANK_KAFKA_ENABLED:false}
  rate-limiting:
    enabled: true
    fail-open: true
  iam:
    redis:
      enabled: true
  payments:
    redis-idempotency: true
  notifications:
    dispatch-mode: kafka
    kafka:
      enabled: true
