<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title th:text="${title}">Notification</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1d26;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f9;padding:32px 16px;">
	<tr>
		<td align="center">
			<table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(15,23,42,0.08);">
				<tr th:if="${alert}">
					<td style="background:linear-gradient(135deg,#b45309 0%,#ea580c 100%);padding:28px 32px;">
						<p style="margin:0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.85;color:#fef3c7;">Bank notification</p>
						<h1 style="margin:8px 0 0;font-size:22px;line-height:1.25;font-weight:600;color:#fffbeb;" th:text="${title}">Title</h1>
					</td>
				</tr>
				<tr th:unless="${alert}">
					<td style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);padding:28px 32px;">
						<p style="margin:0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.85;color:#e2e8f0;">Bank notification</p>
						<h1 style="margin:8px 0 0;font-size:22px;line-height:1.25;font-weight:600;color:#f8fafc;" th:text="${title}">Title</h1>
					</td>
				</tr>
				<tr>
					<td style="padding:28px 32px 8px;">
						<p style="margin:0;font-size:16px;line-height:1.6;color:#334155;" th:text="${lead}">Lead</p>
					</td>
				</tr>
				<tr th:if="${detailLines != null and !detailLines.isEmpty()}">
					<td style="padding:8px 32px 24px;">
						<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;">
							<tr>
								<td style="padding:16px 18px;">
									<p style="margin:0 0 10px;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;">Details</p>
									<ul style="margin:0;padding-left:18px;color:#475569;font-size:14px;line-height:1.55;">
										<li th:each="line : ${detailLines}" th:text="${line}">line</li>
									</ul>
								</td>
							</tr>
						</table>
					</td>
				</tr>
				<tr th:if="${ctaUrl != null and !ctaUrl.isEmpty() and ctaLabel != null and !ctaLabel.isEmpty()}">
					<td style="padding:0 32px 28px;">
						<a th:href="${ctaUrl}" style="display:inline-block;background:#0f172a;color:#f8fafc;text-decoration:none;font-size:14px;font-weight:600;padding:12px 22px;border-radius:8px;" th:text="${ctaLabel}">Action</a>
					</td>
				</tr>
				<tr>
					<td style="padding:20px 32px;border-top:1px solid #e2e8f0;background:#fafbfc;">
						<p style="margin:0;font-size:12px;line-height:1.5;color:#94a3b8;">This message was generated automatically. Please do not reply to this email.</p>
					</td>
				</tr>
			</table>
			<p style="margin:20px 0 0;font-size:11px;color:#94a3b8;">© Bank · Secure banking</p>
		</td>
	</tr>
</table>
</body>
</html>
